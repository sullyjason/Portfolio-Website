<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail - Silvan Roth</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Prism.js for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 min-h-screen text-gray-900 font-sans antialiased">

    <div class="max-w-3xl mx-auto px-8 pt-12 pb-2">
        <!-- Back Link -->
        <a href="index.html"
            class="inline-flex items-center gap-2 text-base font-semibold text-gray-500 hover:text-gray-900 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Projects
        </a>
    </div>

    <!-- Main Content Area -->
    <main class="mt-8 px-8 max-w-3xl sm:py-6 relative mx-auto mb-20" id="project-container">
        <!-- Content will be injected here by project.js -->
        <div class="animate-pulse flex flex-col items-center justify-center py-20">
            <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
            <div class="h-4 bg-gray-200 rounded w-1/2 mb-8"></div>
            <div class="h-64 bg-gray-200 rounded w-full mb-8"></div>
            <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
            <div class="h-4 bg-gray-200 rounded w-5/6 mb-2"></div>
            <div class="h-4 bg-gray-200 rounded w-4/6"></div>
        </div>
    </main>

    <!-- Lightbox Overlay (Hidden by default) -->
    <div id="lightbox"
        class="fixed inset-0 z-50 bg-black/95 opacity-0 pointer-events-none flex items-center justify-center backdrop-blur">
        <!-- Close Button -->
        <button id="lightbox-close"
            class="absolute top-6 right-6 text-white/50 hover:text-white transition-colors bg-white/10 hover:bg-white/20 p-2 rounded-full cursor-pointer z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
        <!-- Lightbox Image -->
        <img id="lightbox-img" src="" alt="Zoomed view" class="max-h-full max-w-full object-contain cursor-grab"
            draggable="false" />
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/project.js"></script>
    <!-- Prism.js and Autoloader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>

</html>
